[build]
  base = "client"
  publish = "build"
  command = "npm run build"

[build.environment]
  NODE_VERSION = "20"
  CI = "false"
  # Set REACT_APP_API_URL in your Netlify site env vars before deploying.
  # e.g. https://electroshack-api.onrender.com/api

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
